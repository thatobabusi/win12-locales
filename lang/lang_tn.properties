# ===== NOTIFICATIONS =====
nts.about=<p class="tit">Windows 12 Online</p><p>Windows 12 Online ke porojeke ya open source,<br />e maikaelelo a yona e leng go neela badirisi maitemogelo a Windows 12 a a builweng pele mo inthaneteng.<br />Ga e dumalane le mofuta wa semmuso wa Windows 12.<br />E dirisa ditegeniki tsa marang-rang tse di tlwaelegileng tse di jaaka HTML, CSS le JS.<br />Porojeke e ga e a golagana le Microsoft mme ga e a tshwanela go<br/>tlhakanngwa le ditlhagiswa tsa Microsoft.<br/>Gape ga se Windows365 cloud PC.<br/>Microsoft, Windows, le ditlhagiswa tse dingwe tsa tshupetso mo porojekeng e<br/>ke maina a kgwebo a Microsoft Corporation.<br/>Android mo porojekeng e ke leina la kgwebo la Google Inc.</p>
