# ===== ABOUT =====
about.name=Ka ga Win12 Online
about.intro=Matseno
about.update=Lonaane lwa diphetogo
about.intro.name=<span></span>Windows 12 Online
about.intro.intro=<span></span>Matseno
about.intro.intro.p1=Windows 12 Online ke porojeke ya open source, e tlhamilwe ke Starry Source. E dirisa HTML, CSS le JS go etsa le go itlhamela Windows 12 mo inthaneteng.
about.intro.intro.p2=Porojeke e e phasaladitswe mo GitHub, Tobetsa fa go bona.
about.intro.intro.p3=Fa o na le ditshwaelo kgotsa dikgakololo, tsweetswee romela di-issue mo Github, bothata jwa gago bo tla rarabololwa ka bonako jo bo kgonegang.
about.intro.intro.p4=Ka ga mokwadi, Starry Source, tobetsa go bona tshedimosetso e nngwe.
about.intro.os=<span></span>Laesense ya Open Source
about.intro.os.p1=Ke porojeke ya open source, e dirisa laesense ya EPL v2.0. Laesense ya open source ke konteraka e e nang le maatla a semolao. Tsweetswee e obamele ka boithaopo mme o tlotle tiro ya ba bangwe.
about.intro.os.p2=Go ya ka laesense, o ka anamisa, abelana, fetola le go phasalatsa porojeke gape, go akaretsa maitlhomo a botho le a kgwebo.
about.intro.os.p3=Mme o tshwanetse go supa motswedi wa khoutu, go akaretsa mokwadi, kgolagano ya porojeke, jj., mme khoutu e tshwanetse go nna open source.
about.intro.os.p4=Mme fa e sa okediwa kgotsa e sa fetolwe mo motheong wa porojeke, ga e tlhoke go nna open source. Mme gape ke ya maitlhomo a thuto fela.
about.intro.thank=<span></span>Ditebogo
about.intro.thank.p1=Ditebogo tse di kgethegileng go @NB-Group, yo o dirileng seabe se segolo mo tlhabololong ya back-end ya porojeke e!
about.intro.contri=<span></span>Batsayakarolo
about.intro.contri.p1=Ditebogo go batsayakarolo botlhe ba porojeke (data ya nako ya nnete, ka palo ya di-Commit)
about.intro.star.p1=Re leboga botlhe ba ba re tshegeditseng.
about.intro.others=<span></span>Tse dingwe
about.intro.others.p1=Porojeke e e theilwe mo mofuteng wa gajaana wa Windows mme ga e dumalane le mofuta wa semmuso wa Windows 12.
about.intro.others.p2=Porojeke e ga e a golagana le Microsoft mme ga e a tshwanela go tlhakanngwa le ditlhagiswa tsa Microsoft. Gape ga se Windows365 cloud PC.
about.intro.others.p3=Microsoft, Windows, le ditlhagiswa tse dingwe tsa tshupetso mo porojekeng e ke maina a kgwebo a Microsoft Corporation. Android mo porojekeng e ke leina la kgwebo la Google Inc.
about.intro.others.p4=Fa o bona tsebe e mo websaeteng e nngwe e e seng win12-online.github.io/win12/desktop.html, o ka tswa o badisa saete ya seipone (mirror). Go etela tsebe ya mantlha, tsweetswee tobetsa fa.
about.update.name=<span></span>Lonaane lwa diphetogo
about.refresh=Ntšhafatsa
about.no-release-notes=Kgololo eno ga e na dintlha tsa kgololo.
about.no-releases=Ga go na dintlha tsa kgololo go fitlha jaanong.
about.untitled-release=Kgololo e e se nang setlhogo
about.contributed=Go dirile seabe

