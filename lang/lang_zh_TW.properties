about.intro.name=<span></span>Windows 12 網頁版
about.intro.intro=<span></span>簡介
about.intro.intro.p1=&emsp;&emsp;Windows 12 網頁版是一個開源專案，由星源創作，使用 HTML、CSS 和 JavaScript，在網絡上模擬、創新操作系統。
about.intro.intro.p2=&emsp;&emsp;此專案已發佈至 GitHub，<a onclick\="window.open('https\://github.com/win12-online/win12','_blank');" win12_title\="https\://github.com/win12-online/win12" class\="jump">點擊此處查看</a>。
about.intro.intro.p3=&emsp;&emsp;若您對於該專案有任何意見或建議，請在 GitHub 上<a onclick\="window.open('https\://github.com/win12-online/win12/issues','_blank');" win12_title\="https\://github.com/win12-online/win12/issues" class\="jump">提交 issues</a>，您的問題會被儘快解決。
about.intro.intro.p4=&emsp;&emsp;原作者星源，點擊以<a onclick\="window.open('https\://tjy-gitnub.github.io/','_blank');" win12_title\="https\://tjy-gitnub.github.io/" class\="jump">瞭解詳細</a>。
about.intro.os=<span></span>開源說明
about.intro.os.p1=&emsp;&emsp;此專案是一個開源專案。此專案使用 EPL v2.0 開源許可證。開源許可證是具有法律效力和法律約束力的合同，請自覺遵守開源許可證，尊重他人勞動。
about.intro.os.p2=&emsp;&emsp;根據許可證，您可以對該專案進行傳播、分發、修改以及二次發布，包括個人和商業用途。
about.intro.os.p3=&emsp;&emsp;但您必須給出源碼來源，<strong>包括作者，專案連結等</strong>，必須使用相同的許可證開源。
about.intro.os.p4=&emsp;&emsp;不是在該專案基礎上進行增加、修改的，僅參考源碼的，不需要開源，但也僅供學習用途。
about.intro.thank=<span></span>特別致謝
about.intro.thank.p1=&emsp;&emsp;特別致謝 @NB-Group，他為本專案的後端開發做出了重要貢獻！
about.intro.contri=<span></span>貢獻者
about.intro.contri.p1=&emsp;&emsp;感謝所有專案的貢獻者（即時數據，計算方法：Commits 次數）
about.intro.star.p1=&emsp;&emsp;感謝<a class\="jump" win12_title\="給個 Star 好不好？（即將跳轉到：https\://github.com/win12-online/win12/stargazers）" onclick\="window.open('https\://github.com/win12-online/win12/stargazers','_blank')">所有支持我們的人</a>。
about.intro.others=<span></span>其它
about.intro.others.p1=&emsp;&emsp;此專案基於目前 Windows 版本創造，與微軟的 Windows 12 正式版本不一致。
about.intro.others.p2=&emsp;&emsp;此專案絕不附屬於微軟，且不應與微軟操作系統或產品混淆，這也不是 Windows365 cloud PC。
about.intro.others.p3=&emsp;&emsp;本專案中微軟、Windows 和其他示範產品是微軟公司的商標。本專案中 Android 是谷歌公司的商標。
about.intro.others.p4=&emsp;&emsp;若您在本專案（網址為 win12-online.github.io/win12/desktop.html）之外的網站看到此頁面，那麼您可能正在瀏覽一個鏡像網站。若欲造訪原始頁面，請點擊<a class\="jump" win12_title\="https\://win12-online.github.io/win12/desktop.html" onclick\="window.open('https\://win12-online.github.io/win12/desktop.html','_blank')">這裡</a>。
