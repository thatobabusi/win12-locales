"project_id_env": "CROWDIN_PROJECT_ID"
"api_token_env": "CROWDIN_PERSONAL_TOKEN"
"base_path": "."
"files": [
  {
    "source": "/lang/lang_zh_CN.properties",
    "translation": "/lang/lang_%locale_with_underscore%.properties",
    "languages_mapping": {
      "locale_with_underscore": {
        "zh_CN": "zh_CN",
        "zh_TW": "zh_TW",
        "en_US": "en"
      }
    }
  }
]
