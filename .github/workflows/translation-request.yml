name: Process Translation Request

on:
  issues:
    types: [opened, edited]

jobs:
  process:
    if: contains(github.event.issue.labels.*.name, 'translation-request')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.BEDEVERE_BOT_TOKEN }}

      - name: Parse issue and update zh-CN properties
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = context.payload.issue.body;
            const issueNumber = context.payload.issue.number;

            function extract(field) {
              const regex = new RegExp(`### ${field}\\s*\\n\\s*([\\s\\S]*?)\\s*(?=\\n### |\\n---|$)`, 'i');
              const match = body.match(regex);
              return match ? match[1].trim() : '';
            }

            const action = extract('操作类型').toLowerCase();
            const key = extract('key');
            const value = extract('zh-CN 翻译值');

            if (!key || !value) {
              core.setFailed('Missing key or zh-CN translation value');
              return;
            }

            if (action.includes('新增') && action.includes('修改') === false) {
              // add new key
            } else if (action.includes('修改')) {
              // update existing key
            }

            const filePath = 'lang/lang_zh_CN.properties';
            let content = fs.readFileSync(filePath, 'utf-8');

            // Normalize line endings
            content = content.replace(/\r\n/g, '\n');

            const lines = content.split('\n');
            let found = false;
            const newLines = [];

            for (const line of lines) {
              if (line.startsWith(key + '=')) {
                newLines.push(`${key}=${value}`);
                found = true;
              } else {
                newLines.push(line);
              }
            }

            if (!found) {
              newLines.push(`${key}=${value}`);
            }

            fs.writeFileSync(filePath, newLines.join('\n') + '\n', 'utf-8');

            core.setOutput('key', key);
            core.setOutput('action', found ? 'updated' : 'added');

      - name: Commit and push
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          git config user.name "Bedevere-win12-bot"
          git config user.email "bedevere-win12-bot@users.noreply.github.com"
          git add lang/lang_zh_CN.properties
          git diff --cached --quiet || git commit -m "chore(i18n): ${{ steps.parse.outputs.action }} translation '${{ steps.parse.outputs.key }}' from issue #${ISSUE_NUMBER}"
          git push

      - name: Comment on issue
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `已自动更新 \_zh-CN\_ 文件（${{ steps.parse.outputs.action }} key: \`${{ steps.parse.outputs.key }}\`）。Crowdin 同步将在下次定时任务或手动触发时执行。`
            });
