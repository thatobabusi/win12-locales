name: Translation request / 翻译提交
description: Submit new or updated zh-CN translation keys / 提交新增或更新的简体中文翻译
title: '[Translation] '
labels: ['translation-request']
body:
  - type: markdown
    id: introduction
    attributes:
      value: |
        请使用此模板提交新的简体中文翻译，或更新已有的翻译。
        Please use this template to submit new Simplified Chinese translation keys or update existing ones.
  - type: checkboxes
    id: prerequisites
    attributes:
      label: 先决条件
      options:
        - label: |
            我已确认本Issue中提及的翻译内容没有在 [其他 issues](https://github.com/win12-online/win12-locales/issues) 中提交过。
          required: true
        - label: |
            我确认此翻译对应的主仓库改动已经或即将提交 PR。
          required: true
  - type: dropdown
    id: action
    attributes:
      label: 操作类型
      options:
        - 新增
        - 修改
    validations:
      required: true
  - type: textarea
    id: translations
    attributes:
      label: 翻译列表
      description: |
        每行填写一个 `key=value`。key 对应 win12 主仓库 HTML 元素中 `data-i18n` 属性的值。
        例如：
        ```
        new-feature-title=新功能
        new-feature-desc=这是一个新功能
        ```
        如需包含 HTML 标签，请确保标签完整保留。
      render: text
    validations:
      required: true
  - type: input
    id: pr
    attributes:
      label: 关联主仓库 PR
      description: 可选。例如 https://github.com/win12-online/win12/pull/123
  - type: textarea
    id: note
    attributes:
      label: 备注
  - type: markdown
    id: status
    attributes:
      value: |
        ---
        [![Process Translation Request](https://github.com/win12-online/win12-locales/workflows/Process%20Translation%20Request/badge.svg)](https://github.com/win12-online/win12-locales/actions/workflows/translation-request.yml)
